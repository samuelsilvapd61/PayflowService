server:
  port: 8888

spring:
  application:
    name: payment

  datasource:
    url: jdbc:postgresql://localhost:5432/payment
    username: payment_user
    password: payment_password
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      password: redis_password

logging:
  level:
    org.flywaydb: DEBUG