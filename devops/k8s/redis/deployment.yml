apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis

spec:
  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis

          image: redis:8.8.0

          ports:
            - containerPort: 6379

          command:
            - redis-server

          args:
            - --requirepass
            - $(REDIS_PASSWORD)

          envFrom:
            - secretRef:
                name: redis-secret