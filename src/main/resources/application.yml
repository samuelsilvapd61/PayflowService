server:
  port: 8888

spring:
  application:
    name: payment

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://host.docker.internal:5432/payment}
    username: ${DATABASE_USERNAME:payment_user}
    password: ${DATABASE_PASSWORD:payment_password}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:host.docker.internal}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_password}