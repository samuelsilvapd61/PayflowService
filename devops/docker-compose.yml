name: payment-service

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile

    container_name: payment-api
    restart: unless-stopped

    ports:
      - "8888:8888"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

    networks:
      - payment-network

  postgres:
    image: postgres:18.4
    container_name: payment-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: payment
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

    networks:
      - payment-network


  redis:
    image: redis:8.8.0
    container_name: payment-redis
    restart: unless-stopped

    command: redis-server --requirepass redis_password

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    networks:
      - payment-network

  prometheus:
    image: prom/prometheus:v3.7.1
    container_name: payment-prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

    networks:
      - payment-network

  grafana:
    image: grafana/grafana:12.2.0
    container_name: payment-grafana
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - grafana_data:/var/lib/grafana

    networks:
      - payment-network


volumes:

  postgres_data:
    name: payment_postgres_data

  redis_data:
    name: payment_redis_data

  grafana_data:
    name: payment_grafana_data

  prometheus_data:
    name: payment_prometheus_data


networks:

  payment-network:
    name: payment-network